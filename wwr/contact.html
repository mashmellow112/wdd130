<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Splash White Water Rafting Co. for reservations, inquiries, and adventure packages on the Nile River in Jinja, Uganda.">
    <meta name="author" content="Samanya Immanuel">
    <title>Contact Us | Splash White Water Rafting Co.</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header class="sticky-header">
        <img src="images/z-splash.png" alt="Splash White Water Rafting Logo" width="80">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-info-section">
            <div class="company-info">
                <h1>White Water Rafting Company</h1>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </div>

            <div class="contact-container">
                <div class="map-box">
                    <div class="map-placeholder">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31918.123456789!2d33.204!3d0.428!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMMKwMjUnNDIuMCIkMzPCsDEyJzE1LjAiRQ!5e0!3m2!1sen!2sug!4v1234567890" 
                            width="100%" 
                            height="400" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>

                <div class="form-box">
                    <form id="contactForm" action="#" method="post" novalidate>
                        <div class="field">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Placeholder">
                        </div>

                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Placeholder">
                        </div>

                        <fieldset class="message-purpose">
                            <legend>Message Purpose</legend>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="purpose" value="general" checked> General Inquiry
                                </label>
                                <label>
                                    <input type="radio" name="purpose" value="reservation"> Reservation Question
                                </label>
                                <label>
                                    <input type="radio" name="purpose" value="website"> Website Suggestion
                                </label>
                            </div>
                        </fieldset>

                        <div class="field">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Type here"></textarea>
                        </div>

                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" name="newsletter"> Please Subscribe me to the monthly newsletter
                            </label>
                        </div>

                        <button type="submit" class="submit-btn">Get In Touch!</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="team-section">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">
                <div class="team-card">
                    <img src="images/img.webp" alt="Employee Profile">
                    <h3>Employee Profile</h3>
                </div>
                <div class="team-card">
                    <img src="images/img.webp" alt="Employee Profile">
                    <h3>Employee Profile</h3>
                </div>
                <div class="team-card">
                    <img src="images/happy-client.jpg" alt="Employee Profile">
                    <h3>Employee Profile</h3>
                </div>
            </div>
        </section>

        
    </main>
    <footer>
        <p>&copy; 2026 Splash White Water Rafting Co. | Samanya Immanuel</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
    <script src="scripts/contact.js"></script>
</body>
</html>
